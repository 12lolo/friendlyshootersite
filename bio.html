<!DOCTYPE HTML>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>FriendlyShooter — Characters & Enemies</title>
        <link href="https://static.itch.io/game.css?1773778275" rel="stylesheet"/>
        <link rel="stylesheet" href="webleaderboard/leaderboard.css">
        <style>
            :root{ --bg:#09280f; --accent:#02ff77; --muted:#9feab0; --panel:#0c210b; --border:#265424; }
            html,body{ height:100%; margin:0; }
            body { background-color: var(--bg); color: var(--accent); font-family: '04b_03', Lato, system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
            .content { max-width: 1100px; margin: 20px auto; padding: 20px; background: rgba(12,33,11,0.88); border-radius:10px; box-shadow: 0 6px 20px rgba(0,0,0,0.5); border:1px solid rgba(37,84,36,0.08); }
            .section-title{ display:flex; align-items:center; gap:12px; }
            .section-title h3{ margin:0; font-size:1.25rem; }
            .card{ padding:14px; margin:18px 0; border-radius:8px; border:1px solid rgba(37,84,36,0.12); background:linear-gradient(180deg, rgba(0,0,0,0.02), transparent); }

            /* grid of items */
            .items-grid{ display:grid; grid-template-columns: repeat(1, 1fr); gap:14px; margin-top:12px; }
            @media (min-width:760px){ .items-grid{ grid-template-columns: repeat(3, 1fr); } }
            .item-card{ background: rgba(0,0,0,0.04); border:1px solid var(--border); border-radius:6px; overflow:hidden; display:flex; flex-direction:column; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
            .item-img{ width:100%; height:140px; object-fit:cover; background:var(--panel); display:block; }
            .item-content{ padding:10px; }
            .item-title{ font-weight:700; margin:0 0 6px 0; color:var(--accent); }
            .item-bio{ color:var(--muted); font-size:0.95rem; margin-bottom:8px; }
            .item-meta{ color:#c6f7d0; font-size:0.9rem; }

            .small{ font-size:0.9rem; color:var(--muted); }
            a.button{ background:#d400b1;color:white;padding:8px 12px;border-radius:6px;text-decoration:none }

            @media (max-width:520px){ .item-img{ height:120px } .content{ padding:12px } }
        </style>
        <style>
            /* modal / lightbox */
            .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:9999 }
            .modal-card{ background:linear-gradient(180deg, #07130a, #081b0d); color:var(--accent); border:1px solid rgba(37,84,36,0.16); border-radius:10px; max-width:1000px; width:92%; max-height:90vh; overflow:auto; box-shadow:0 12px 40px rgba(0,0,0,0.8); }
            .modal-body{ display:flex; gap:12px; padding:14px; }
            .modal-img{ width:48%; max-width:480px; height:auto; object-fit:contain; background:var(--panel); border-radius:6px; }
            .modal-info{ flex:1; padding:6px 2px; }
            .modal-close{ position:absolute; right:18px; top:12px; background:#d400b1; color:white; padding:6px 8px; border-radius:6px; text-decoration:none }
            @media (max-width:720px){ .modal-body{ flex-direction:column } .modal-img{ width:100%; } }
        </style>
    </head>
    <body>
        <div id="wrapper" class="main wrapper">
            <div class="inner_column size_large family_pixel" id="inner_column">
                <div class="header align_center has_image" id="header">
                    <img alt="FriendlyShooter" src="https://img.itch.zone/aW1nLzI2NTc5NTczLmpwZw==/original/dvtKIR.jpg"/>
                    <h1 class="game_title">Characters &amp; Enemies</h1>
                </div>

                <div class="content">
                    <section class="card" id="charactersSection">
                        <h3>Player Characters</h3>
                        <div id="charactersGrid" class="items-grid">Loading characters…</div>
                    </section>

                    <section class="card" id="enemiesSection">
                        <h3>Enemies</h3>
                        <div id="enemiesGrid" class="items-grid">Loading enemies…</div>
                    </section>

                    <section class="card" id="mapsSection">
                        <h3>Maps</h3>
                        <div id="mapsGrid" class="items-grid">Loading maps…</div>
                    </section>

                    <div style="text-align:center;margin-top:12px">
                        <a href="/" class="button">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>

        <script>
        (function(){
            const API = '/api/admin.php';
            const fallback = 'webleaderboard/example-data.json';

            function el(tag, cls, html){ const d = document.createElement(tag); if(cls) d.className = cls; if(html!==undefined) d.innerHTML = html; return d; }
            function safe(v){ return v===undefined || v===null ? '' : v; }

            async function fetchItems(type){
                try{
                    const r = await fetch(API + '?action=items&type=' + encodeURIComponent(type));
                    if (!r.ok) throw new Error('api');
                    const j = await r.json();
                    if (type === 'character') return j.characters || [];
                    if (type === 'enemy') return j.enemies || [];
                    if (type === 'map') return j.maps || [];
                    return [];
                }catch(err){
                    // fallback to example data
                    try{
                        const rf = await fetch(fallback); if (!rf.ok) throw new Error('fallback');
                        const jf = await rf.json();
                        return jf[type + (type==='map' ? 's' : (type==='enemy' ? 's' : 's'))] || [];
                    }catch(e){ return []; }
                }
            }

            function makeCard(item, type){
                    const wrapper = el('div','item-card');
                    const image = (item.extra && item.extra.image) ? item.extra.image : (item.image || '');
                    if (image){ const i = el('img','item-img'); i.src = image; wrapper.appendChild(i); }
                    else { const ph = el('div','item-img'); ph.style.display='flex'; ph.style.alignItems='center'; ph.style.justifyContent='center'; ph.innerHTML = '<span class="small">No image</span>'; wrapper.appendChild(ph); }

                    const dataCol = el('div','item-content');
                    const title = el('div','item-title', safe(item.name || item.title || 'Untitled'));
                    const bio = el('div','item-bio', safe(item.bio || item.description || ''));
                    dataCol.appendChild(title); dataCol.appendChild(bio);
                    if (type === 'map'){
                        const size = (item.extra && item.extra.size) ? item.extra.size : (item.size || 'unknown');
                        const sizeText = (typeof size === 'object') ? (size.width + ' x ' + size.height) : size;
                        dataCol.appendChild(el('div','item-meta','Size: ' + safe(sizeText)));
                    } else {
                        dataCol.appendChild(el('div','item-meta','Health: ' + safe(item.health || 0) + ' • Damage: ' + safe(item.damage || 0) + ' • Movement: ' + safe(item.movement || '')));
                    }
                    wrapper.appendChild(dataCol);
                    // open modal on click
                    wrapper.addEventListener('click', (ev)=>{
                        // don't trigger when clicking links
                        if (ev.target && (ev.target.tagName === 'A' || ev.target.closest && ev.target.closest('a'))) return;
                        openModal(item, type);
                    });
                    return wrapper;
            }

                // modal
                function openModal(item, type){
                    const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
                    const card = document.createElement('div'); card.className = 'modal-card';
                    const close = document.createElement('a'); close.href='#'; close.className='modal-close'; close.textContent='Close';
                    close.addEventListener('click', (e)=>{ e.preventDefault(); document.body.removeChild(overlay); });
                    card.appendChild(close);
                    const body = document.createElement('div'); body.className='modal-body';
                    const imgWrap = document.createElement('div');
                    const img = document.createElement('img'); img.className='modal-img'; img.src = (item.extra && item.extra.image) ? item.extra.image : (item.image || '');
                    img.alt = item.name || item.title || '';
                    imgWrap.appendChild(img);
                    const info = document.createElement('div'); info.className='modal-info';
                    const title = document.createElement('h2'); title.textContent = item.name || item.title || 'Untitled'; title.style.marginTop='0';
                    const bio = document.createElement('div'); bio.className='item-bio'; bio.textContent = item.bio || item.description || '';
                    info.appendChild(title); info.appendChild(bio);
                    if (type === 'map'){
                        const size = (item.extra && item.extra.size) ? item.extra.size : (item.size || 'unknown');
                        const sizeText = (typeof size === 'object') ? (size.width + ' x ' + size.height) : size;
                        const meta = document.createElement('div'); meta.className='item-meta'; meta.textContent = 'Size: ' + sizeText; info.appendChild(meta);
                    } else {
                        const meta = document.createElement('div'); meta.className='item-meta'; meta.textContent = 'Health: ' + (item.health||0) + ' • Damage: ' + (item.damage||0) + ' • Movement: ' + (item.movement||''); info.appendChild(meta);
                    }
                    body.appendChild(imgWrap); body.appendChild(info); card.appendChild(body); overlay.appendChild(card);
                    overlay.addEventListener('click', (e)=>{ if (e.target === overlay) document.body.removeChild(overlay); });
                    document.addEventListener('keydown', function escHandler(e){ if (e.key === 'Escape'){ if (document.body.contains(overlay)) document.body.removeChild(overlay); document.removeEventListener('keydown', escHandler); } });
                    document.body.appendChild(overlay);
                }

            async function render(){
                const chars = await fetchItems('character');
                const enemies = await fetchItems('enemy');
                const maps = await fetchItems('map');

                const cg = document.getElementById('charactersGrid'); cg.innerHTML = '';
                if (chars.length===0) cg.innerHTML = '<p class="small">No characters found.</p>';
                chars.forEach(c => cg.appendChild(makeCard(c,'character')));

                const eg = document.getElementById('enemiesGrid'); eg.innerHTML = '';
                if (enemies.length===0) eg.innerHTML = '<p class="small">No enemies found.</p>';
                enemies.forEach(e => eg.appendChild(makeCard(e,'enemy')));

                const mg = document.getElementById('mapsGrid'); mg.innerHTML = '';
                if (maps.length===0) mg.innerHTML = '<p class="small">No maps found.</p>';
                maps.forEach(m => mg.appendChild(makeCard(m,'map')));
            }

            render();
        })();
        </script>
    </body>
</html>
