<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FriendlyShooter Leaderboard</title>
    <link href="https://static.itch.io/game.css?1773778275" rel="stylesheet"/>
    <link rel="stylesheet" href="webleaderboard/leaderboard.css">
    <style>body{padding:20px;background:#09160b;color:#02ff77;font-family:Arial,Helvetica,sans-serif}</style>
  </head>
  <body>
    <h1 style="text-align:center">FriendlyShooter — Leaderboard</h1>
    <div style="text-align:center;margin:12px 0">
      <a href="/" class="button">Back to Home</a>
      <a href="webleaderboard/index.html" class="button" style="margin-left:8px">Standalone Widget</a>
    </div>

    <div id="leaderboard-root" class="leaderboard-root"></div>

    <script src="webleaderboard/leaderboard.js"></script>
    <script>
      // initialize with example data inline to avoid fetch/CORS issues on some hosts
      initLeaderboard('leaderboard-root', {
        apiUrl: 'webleaderboard/example-data.json',
        data: [
          { "playerId": "p1", "playerName": "Alice", "score": 1200, "timestamp": 1712000000 },
          { "playerId": "p2", "playerName": "Bob", "score": 1100, "timestamp": 1711990000 },
          { "playerId": "p3", "playerName": "Carol", "score": 900, "timestamp": 1711980000 }
        ],
        title: 'Top Players',
        maxEntries: 25,
        refreshSeconds: 30
      });
    </script>
  </body>
</html>
